services:
  - type: web
    name: gridiron-give
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disk:
      name: gridiron-give-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: APP_BASE_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_ENABLED
        value: "true"
      - key: ADMIN_FULL_USERNAME
        value: AdminUser
      - key: ADMIN_FULL_PASSWORD
        sync: false
      - key: ADMIN_READONLY_USERNAME
        value: DBmanageruser
      - key: ADMIN_READONLY_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
